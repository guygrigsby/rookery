name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Lint runs inside `make check` (golangci-lint v2 via `go run`, built with
      # the setup-go toolchain), so there is no separate action whose prebuilt
      # binary could lag the module's Go version.
      - name: make check
        run: make check
      - name: make test
        run: make test
